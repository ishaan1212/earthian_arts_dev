name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render deploy
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Skip when Render deploy hook is missing
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "Render deployment skipped."
          echo "Add RENDER_DEPLOY_HOOK_URL as a repository secret to enable this workflow."

      - name: Trigger deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"
